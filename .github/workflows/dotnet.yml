name: .NET - Ubuntu

on:
  push:
    branches: [ "next" ]
  pull_request:
    branches: [ "next" ]

permissions:
  contents: read
  statuses: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['9.0.101'] 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        
    - name: Restore dependencies
      run: dotnet restore FastClonerCi.slnf

    - name: Build
      run: dotnet build FastClonerCi.slnf --no-restore

    - name: Test
      run: dotnet test FastClonerCi.slnf --no-build --verbosity normal

    - name: Update GitHub status check
      if: always()
      uses: Sibz/github-status-action@v1
      with: 
        authToken: ${{secrets.GITHUB_TOKEN}}
        context: 'Tests'
        description: 'The tests ${{ job.status == ''success'' && ''passed'' || ''failed'' }}'
        state: ${{ job.status == 'success' && 'success' || 'failure' }}
        sha: ${{ github.event.pull_request.head.sha || github.sha }}
        target_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-netstandard20:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        
    - name: Build FastCloner for netstandard2.0
      run: dotnet build FastCloner/ --framework netstandard2.0

    - name: Update GitHub status check
      if: always()
      uses: Sibz/github-status-action@v1
      with: 
        authToken: ${{secrets.GITHUB_TOKEN}}
        context: 'Build (netstandard2.0)'
        description: 'The build for netstandard2.0 ${{ job.status == ''success'' && ''passed'' || ''failed'' }}'
        state: ${{ job.status == 'success' && 'success' || 'failure' }}
        sha: ${{ github.event.pull_request.head.sha || github.sha }}
        target_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-net462:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        
    - name: Build FastCloner for net462
      run: dotnet build FastCloner/ --framework net462

    - name: Update GitHub status check
      if: always()
      uses: Sibz/github-status-action@v1
      with: 
        authToken: ${{secrets.GITHUB_TOKEN}}
        context: 'Build (net462)'
        description: 'The build for net462 ${{ job.status == ''success'' && ''passed'' || ''failed'' }}'
        state: ${{ job.status == 'success' && 'success' || 'failure' }}
        sha: ${{ github.event.pull_request.head.sha || github.sha }}
        target_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}